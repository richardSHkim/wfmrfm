# GR00T-LeRobot (policy) joint ordering for the Go2 + Airbot Play decoupled-WBC embodiment.
# Group names MUST match the JOINT groups in ../modality_converter.json ("arm", "gripper");
# the converter concatenates these groups, in this order, into observation.state / action.
# The 12 Go2 leg joints are intentionally absent: they are produced by the RL locomotion
# policy and are not part of the VLA state/action space.
joints:
  arm:
    - joint1
    - joint2
    - joint3
    - joint4
    - joint5
    - joint6
  gripper:
    # Airbot Play parallel gripper: g2_joint is the driver (opening 0..0.072 m). The mimic
    # fingers g2_left_joint / g2_right_joint are reconstructed by the control layer and are
    # NOT recorded as independent VLA dims.
    - g2_joint
